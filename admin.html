<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMTech — Admin</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=04150514"></script>
  <script src="js/auth.js?v=04150514"></script>
  <link rel="stylesheet" href="css/styles.css?v=04150514">
  <style>
    .adm-layout { display: flex; min-height: 100vh; }
    .adm-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      display: flex;
      flex-direction: column;
    }
    .adm-logo {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .adm-logo .name { font-size: 16px; font-weight: 800; color: var(--accent); }
    .adm-logo .sub  { font-size: 10px; color: var(--text-dim); font-family: 'Fira Code', monospace; }
    .adm-nav-item {
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color .12s, background .12s;
    }
    .adm-nav-item:hover { color: var(--text); background: var(--surface-2); }
    .adm-nav-item.active { color: var(--accent); background: rgba(249,115,22,.08); }
    .adm-nav-item .badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 1px 6px;
      border-radius: 20px;
    }
    .adm-main {
      flex: 1;
      padding: 28px 32px;
      overflow-y: auto;
    }
    .adm-page { display: none; }
    .adm-page.active { display: block; }
    .adm-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }
    .adm-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 24px;
    }

    /* Métricas */
    .adm-metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .adm-metric {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 16px;
    }
    .adm-metric-val  { font-size: 28px; font-weight: 800; color: var(--text); }
    .adm-metric-lbl  { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }

    /* Tabela */
    .adm-table-wrap { overflow-x: auto; }
    table.adm { width: 100%; border-collapse: collapse; }
    table.adm th {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    table.adm td {
      font-size: 13px;
      color: var(--text);
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    table.adm tr:hover td { background: var(--surface-2); }

    .badge-plan {
      display: inline-block;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .badge-plan.trial       { background: rgba(251,191,36,.12); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
    .badge-plan.profissional{ background: rgba(249,115,22,.12); color: var(--accent); border: 1px solid rgba(249,115,22,.3); }
    .badge-plan.empresarial { background: rgba(74,222,128,.12); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }
    .badge-plan.expirado    { background: rgba(239,68,68,.12); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
    .badge-plan.admin       { background: rgba(139,92,246,.12); color: #a78bfa; border: 1px solid rgba(139,92,246,.3); }

    .adm-select-plan {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      font-family: 'Manrope', sans-serif;
      padding: 5px 8px;
      cursor: pointer;
    }
    .adm-select-plan:focus { outline: 1px solid var(--accent); }

    .btn-adm {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      font-family: 'Manrope', sans-serif;
      padding: 5px 12px;
      cursor: pointer;
      transition: all .12s;
    }
    .btn-adm:hover { color: var(--text); border-color: var(--text-muted); }
    .btn-adm.primary { border-color: var(--accent); color: var(--accent); }
    .btn-adm.primary:hover { background: var(--accent); color: #fff; }
    .btn-adm.success { border-color: #4ade80; color: #4ade80; }
    .btn-adm.success:hover { background: #4ade80; color: #000; }
    .btn-adm.danger  { border-color: #f87171; color: #f87171; }

    .trial-expiry { font-size: 11px; color: var(--text-dim); font-family: 'Fira Code', monospace; }
    .trial-expiry.vencendo { color: #fbbf24; }
    .trial-expiry.expirado { color: #f87171; }

    .pendente-badge {
      display: inline-block;
      background: rgba(251,191,36,.15);
      color: #fbbf24;
      border: 1px solid rgba(251,191,36,.4);
      font-size: 10px;
      font-weight: 800;
      padding: 2px 7px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .confirmado-badge {
      display: inline-block;
      background: rgba(74,222,128,.1);
      color: #4ade80;
      border: 1px solid rgba(74,222,128,.3);
      font-size: 10px;
      font-weight: 800;
      padding: 2px 7px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .adm-empty {
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      border: 1px dashed var(--border);
    }
    .adm-loading { color: var(--text-dim); font-size: 13px; padding: 20px 0; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f97316">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DMTech">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="adm-layout">
    <!-- Sidebar -->
    <aside class="adm-sidebar">
      <div class="adm-logo">
        <div class="name">DMTech</div>
        <div class="sub">// painel admin</div>
      </div>
      <nav>
        <div class="adm-nav-item active" onclick="irPara('empresas',this)">
          <span>◈</span> Empresas
        </div>
        <div class="adm-nav-item" onclick="irPara('upgrades',this)">
          <span>◉</span> Upgrades
          <span class="badge" id="badge-pendentes" style="display:none">0</span>
        </div>
      </nav>
      <div style="margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px" id="adm-user-nome"></div>
        <div class="btn-adm danger" style="width:100%;text-align:center" onclick="signOut()">Sair</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="adm-main">

      <!-- Empresas -->
      <div class="adm-page active" id="page-empresas">
        <div class="adm-title">Empresas</div>
        <div class="adm-sub">Todas as contas ativas na plataforma</div>

        <div class="adm-metrics" id="adm-metrics">
          <div class="adm-metric"><div class="adm-metric-val" id="mt-total">—</div><div class="adm-metric-lbl">Total</div></div>
          <div class="adm-metric"><div class="adm-metric-val" id="mt-trial">—</div><div class="adm-metric-lbl">Em Trial</div></div>
          <div class="adm-metric"><div class="adm-metric-val" id="mt-pagantes">—</div><div class="adm-metric-lbl">Pagantes</div></div>
          <div class="adm-metric"><div class="adm-metric-val" id="mt-expirados">—</div><div class="adm-metric-lbl">Expirados</div></div>
        </div>

        <div class="adm-table-wrap">
          <div class="adm-loading" id="loading-empresas">Carregando...</div>
          <table class="adm" id="tabela-empresas" style="display:none">
            <thead>
              <tr>
                <th>Empresa</th>
                <th>Dono</th>
                <th>Plano</th>
                <th>Trial / Vencimento</th>
                <th>OS</th>
                <th>Clientes</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="body-empresas"></tbody>
          </table>
        </div>
      </div>

      <!-- Upgrades -->
      <div class="adm-page" id="page-upgrades">
        <div class="adm-title">Solicitações de Upgrade</div>
        <div class="adm-sub">Clientes que já pagaram e aguardam ativação</div>
        <div class="adm-table-wrap">
          <div class="adm-loading" id="loading-upgrades">Carregando...</div>
          <div id="lista-upgrades"></div>
        </div>
      </div>

    </main>
  </div>

  <script>
    console.log('%c DMTechApp Admin ' + VERSION + ' ', 'background:#0d0d0d;color:#f97316;font-weight:bold;padding:2px 8px');


    if (localStorage.getItem('dmtech-theme') === 'light') document.body.classList.add('light');

    let _empresas = [];
    let _upgrades = [];

    function irPara(pagina, el) {
      document.querySelectorAll('.adm-page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.adm-nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('page-' + pagina).classList.add('active');
      el.classList.add('active');
      if (pagina === 'upgrades' && !_upgrades.length) carregarUpgrades();
    }

    function badgePlano(plan) {
      return `<span class="badge-plan ${plan}">${plan}</span>`;
    }

    function trialInfo(ends_at, plan) {
      if (plan === 'expirado') return '<span class="trial-expiry expirado">expirado</span>';
      if (plan !== 'trial' || !ends_at) return '—';
      const d = new Date(ends_at);
      const diff = Math.ceil((d - new Date()) / 86400000);
      const str = d.toLocaleDateString('pt-BR');
      if (diff < 0)  return `<span class="trial-expiry expirado">expirou ${str}</span>`;
      if (diff <= 3) return `<span class="trial-expiry vencendo">${diff}d restantes</span>`;
      return `<span class="trial-expiry">${diff}d — ${str}</span>`;
    }

    function renderEmpresasTabela() {
      const tbody = document.getElementById('body-empresas');
      if (!_empresas.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:40px">Nenhuma empresa cadastrada.</td></tr>';
      } else {
        tbody.innerHTML = _empresas.map(e => `
          <tr>
            <td><strong>${esc(e.name)}</strong></td>
            <td>
              <div style="font-size:12px">${esc(e.owner_name || '—')}</div>
              <div style="font-size:11px;color:var(--text-dim)">${esc(e.owner_email || '')}</div>
            </td>
            <td>${badgePlano(e.plan)}</td>
            <td>${trialInfo(e.trial_ends_at, e.plan)}</td>
            <td style="font-family:'Fira Code',monospace">${e.os_count}</td>
            <td style="font-family:'Fira Code',monospace">${e.client_count}</td>
            <td style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              <select class="adm-select-plan" onchange="trocarPlano('${e.id}', this.value, this)" data-original="${e.plan}">
                <option value="trial"        ${e.plan==='trial'?'selected':''}>Trial</option>
                <option value="profissional" ${e.plan==='profissional'?'selected':''}>Profissional</option>
                <option value="empresarial"  ${e.plan==='empresarial'?'selected':''}>Empresarial</option>
                <option value="expirado"     ${e.plan==='expirado'?'selected':''}>Expirado</option>
              </select>
              <button class="btn-adm primary" onclick="acessarEmpresa('${e.id}')">Acessar &#8594;</button>
            </td>
          </tr>
        `).join('');
      }
      document.getElementById('loading-empresas').style.display = 'none';
      document.getElementById('tabela-empresas').style.display = 'table';
    }

    function atualizarMetricas() {
      const total     = _empresas.length;
      const trial     = _empresas.filter(e => e.plan === 'trial').length;
      const pagantes  = _empresas.filter(e => ['profissional','empresarial'].includes(e.plan)).length;
      const expirados = _empresas.filter(e => e.plan === 'expirado').length;
      document.getElementById('mt-total').textContent    = total;
      document.getElementById('mt-trial').textContent    = trial;
      document.getElementById('mt-pagantes').textContent = pagantes;
      document.getElementById('mt-expirados').textContent= expirados;
    }

    async function carregarEmpresas() {
      const { data, error } = await sb.rpc('admin_list_companies');
      if (error) {
        document.getElementById('loading-empresas').textContent = 'Erro: ' + error.message;
        return;
      }
      _empresas = data || [];
      atualizarMetricas();
      renderEmpresasTabela();
    }

    async function trocarPlano(companyId, novoPlano, selectEl) {
      const original = selectEl.dataset.original;
      if (novoPlano === original) return;
      const ok = await dmConfirmAsync(`Alterar plano para "${novoPlano}"?`);
      if (!ok) { selectEl.value = original; return; }
      const { error } = await sb.rpc('admin_update_plan', {
        p_company_id: companyId,
        p_plan: novoPlano
      });
      if (error) {
        dmToast('Erro: ' + error.message, 'error');
        selectEl.value = original;
        return;
      }
      selectEl.dataset.original = novoPlano;
      const emp = _empresas.find(e => e.id === companyId);
      if (emp) emp.plan = novoPlano;
      atualizarMetricas();
      dmToast('Plano atualizado!');
    }

    async function carregarUpgrades() {
      document.getElementById('loading-upgrades').style.display = 'block';
      const { data, error } = await sb.rpc('admin_list_upgrade_requests');
      document.getElementById('loading-upgrades').style.display = 'none';
      if (error) { document.getElementById('lista-upgrades').innerHTML = '<div class="adm-empty">Erro: ' + esc(error.message) + '</div>'; return; }
      _upgrades = data || [];
      const pendentes = _upgrades.filter(u => u.status === 'pendente').length;
      const badge = document.getElementById('badge-pendentes');
      if (pendentes > 0) { badge.textContent = pendentes; badge.style.display = 'inline'; }
      else badge.style.display = 'none';
      renderUpgrades();
    }

    function renderUpgrades() {
      const el = document.getElementById('lista-upgrades');
      if (!_upgrades.length) {
        el.innerHTML = '<div class="adm-empty">Nenhuma solicitação de upgrade ainda.</div>';
        return;
      }
      el.innerHTML = `
        <table class="adm">
          <thead><tr>
            <th>Empresa</th><th>Plano</th><th>E-mail</th>
            <th>Solicitado em</th><th>Status</th><th>Ação</th>
          </tr></thead>
          <tbody>
            ${_upgrades.map(u => `
              <tr>
                <td><strong>${esc(u.company_name)}</strong></td>
                <td>${badgePlano(u.plano_solicitado)}</td>
                <td style="font-size:12px;color:var(--text-muted)">${esc(u.email_contato || '—')}</td>
                <td style="font-size:11px;color:var(--text-dim);font-family:'Fira Code',monospace">
                  ${new Date(u.created_at).toLocaleString('pt-BR')}
                </td>
                <td>
                  ${u.status === 'pendente'
                    ? '<span class="pendente-badge">Pendente</span>'
                    : '<span class="confirmado-badge">Confirmado</span>'}
                </td>
                <td>
                  ${u.status === 'pendente' ? `
                    <button class="btn-adm success" onclick="confirmarUpgrade('${u.id}','${u.company_id}','${u.plano_solicitado}')">
                      Confirmar
                    </button>
                  ` : '—'}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function acessarEmpresa(companyId) {
      localStorage.setItem('dmtech-admin-company', companyId);
      window.location.href = 'dashboard.html';
    }

    async function confirmarUpgrade(requestId, companyId, plano) {
      const ok = await dmConfirmAsync(`Confirmar upgrade para "${plano}" e ativar o acesso?`);
      if (!ok) return;
      const { error } = await sb.rpc('admin_update_plan', {
        p_company_id: companyId,
        p_plan:       plano,
        p_request_id: requestId
      });
      if (error) { dmToast('Erro: ' + error.message, 'error'); return; }
      dmToast('Plano ativado!');
      carregarUpgrades();
    }

    // Promise wrapper para dmConfirm
    function dmConfirmAsync(msg) {
      return new Promise(resolve => {
        dmConfirm(msg, () => resolve(true));
        document.getElementById('dm-confirm-cancel').addEventListener('click', () => resolve(false), { once: true });
      });
    }

    function esc(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Init
    (async () => {
      await requireAuth();
      if (!isPlatformAdmin()) {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-dim);font-size:14px">Acesso restrito.</div>';
        return;
      }
      document.getElementById('adm-user-nome').textContent = APP.profile?.name || APP.user?.email || '';
      carregarEmpresas();
      carregarUpgrades();
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
