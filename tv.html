<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMTech — Painel TV</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #080808;
      --surface:  #111;
      --border:   #222;
      --text:     #f0f0f0;
      --text-dim: #666;
      --accent:   #f97316;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* HEADER */
    .tv-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tv-logo { display: flex; align-items: center; gap: 14px; }
    .tv-logo img { height: 36px; object-fit: contain; }
    .tv-company { font-size: 20px; font-weight: 800; color: var(--text); }
    .tv-badge {
      font-size: 10px; font-weight: 800; letter-spacing: .1em;
      text-transform: uppercase; color: var(--accent);
      border: 1px solid rgba(249,115,22,.4); padding: 3px 8px;
    }
    .tv-right { display: flex; align-items: center; gap: 20px; }
    .tv-clock { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
    .tv-refresh { font-size: 11px; color: var(--text-dim); text-align: right; }
    /* BOARD */
    .tv-board {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }
    .tv-col {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .tv-col-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--col-color, var(--border));
      flex-shrink: 0;
    }
    .tv-col-title {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--col-color, var(--text-dim));
    }
    .tv-col-count {
      font-size: 13px;
      font-weight: 800;
      color: var(--col-color, var(--text-dim));
      background: rgba(255,255,255,.06);
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }
    .tv-col[data-status="aberta"]          { --col-color: #60a5fa; }
    .tv-col[data-status="em_andamento"]    { --col-color: #f97316; }
    .tv-col[data-status="aguardando_peca"] { --col-color: #fbbf24; }
    .tv-col[data-status="pronta"]          { --col-color: #4ade80; }
    .tv-col-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tv-col-body::-webkit-scrollbar { width: 4px; }
    .tv-col-body::-webkit-scrollbar-thumb { background: var(--border); }
    /* CARD */
    .tv-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--col-color, var(--border));
      padding: 12px 14px;
      transition: opacity .3s;
    }
    .tv-card-num {
      font-size: 11px;
      font-weight: 800;
      color: var(--col-color, var(--text-dim));
      letter-spacing: .06em;
      margin-bottom: 4px;
    }
    .tv-card-client {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .tv-card-notes {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tv-card-footer {
      margin-top: 6px;
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tv-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--text-dim);
      padding: 40px;
    }
    /* ERRO / LOADING */
    .tv-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .tv-center h2 { font-size: 18px; color: var(--text-dim); font-weight: 600; }
    .tv-center p  { font-size: 13px; color: #444; }
    /* FOOTER */
    .tv-footer {
      padding: 8px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .tv-version { font-size: 10px; color: #333; }
  </style>
</head>
<body>

  <div id="root" style="display:flex;flex-direction:column;min-height:100vh">
    <div class="tv-center">
      <h2>Carregando painel...</h2>
    </div>
  </div>

  <script>
    console.log('%c DMTechApp TV ' + VERSION + ' ', 'background:#0d0d0d;color:#f97316;font-weight:bold;padding:2px 8px');

    const TOKEN = new URLSearchParams(location.search).get('t');
    const COLUNAS = [
      { status: 'aberta',          label: 'Aberta'        },
      { status: 'em_andamento',    label: 'Em Andamento'  },
      { status: 'aguardando_peca', label: 'Aguard. Liberação' },
      { status: 'pronta',          label: 'Pronta ✓'      },
    ];

    let _dados     = null;
    let _countdown = 30;
    let _timer     = null;

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function fmtData(iso) {
      if (!iso) return '';
      const [y,m,d] = iso.split('T')[0].split('-');
      return `${d}/${m}`;
    }

    function renderBoard(dados) {
      const c   = dados.company || {};
      const os  = dados.os || [];
      const root = document.getElementById('root');

      root.innerHTML = `
        <div class="tv-header">
          <div class="tv-logo">
            ${c.logo ? `<img src="${esc(c.logo)}" alt="logo">` : ''}
            <div>
              <div class="tv-company">${esc(c.name)}</div>
            </div>
            <span class="tv-badge">Painel TV</span>
          </div>
          <div class="tv-right">
            <div>
              <div class="tv-clock" id="tv-clock">--:--</div>
              <div class="tv-refresh" id="tv-refresh">Atualiza em ${_countdown}s</div>
            </div>
          </div>
        </div>
        <div class="tv-board">
          ${COLUNAS.map(col => {
            const cards = os.filter(o => o.status === col.status);
            return `
              <div class="tv-col" data-status="${col.status}">
                <div class="tv-col-header">
                  <span class="tv-col-title">${col.label}</span>
                  <span class="tv-col-count">${cards.length}</span>
                </div>
                <div class="tv-col-body">
                  ${cards.length === 0
                    ? '<div class="tv-empty">—</div>'
                    : cards.map(o => `
                      <div class="tv-card">
                        <div class="tv-card-num">#${esc(o.numero)}</div>
                        <div class="tv-card-client">${esc(o.client_name) || '—'}</div>
                        ${o.notes ? `<div class="tv-card-notes">${esc(o.notes.substring(0, 70))}</div>` : ''}
                        <div class="tv-card-footer">
                          <span>${o.responsavel_name ? '👤 ' + esc(o.responsavel_name.split(' ')[0]) : ''}</span>
                          <span>${fmtData(o.created_at)}</span>
                        </div>
                      </div>`).join('')
                  }
                </div>
              </div>`;
          }).join('')}
        </div>
        <div class="tv-footer">
          <span>Total ativo: <strong>${os.length}</strong> OS</span>
          <span class="tv-version">DMTechApp ${VERSION}</span>
        </div>
      `;
      iniciarRelogio();
    }

    function renderErro(msg) {
      document.getElementById('root').innerHTML = `
        <div class="tv-center">
          <h2>${esc(msg)}</h2>
          <p>Verifique o link ou gere um novo na página de Configurações.</p>
        </div>`;
    }

    async function carregar() {
      if (!TOKEN) { renderErro('Link inválido — token ausente.'); return; }
      const { data, error } = await sb.rpc('tv_get_board', { p_token: TOKEN });
      if (error) { renderErro('Erro ao carregar: ' + error.message); return; }
      if (!data)  { renderErro('Token inválido ou expirado.'); return; }
      _dados = data;
      _countdown = 30;
      renderBoard(data);
    }

    function iniciarRelogio() {
      clearInterval(_timer);
      _timer = setInterval(() => {
        const now = new Date();
        const hh  = String(now.getHours()).padStart(2,'0');
        const mm  = String(now.getMinutes()).padStart(2,'0');
        const el  = document.getElementById('tv-clock');
        const er  = document.getElementById('tv-refresh');
        if (el) el.textContent = hh + ':' + mm;
        _countdown--;
        if (_countdown <= 0) { _countdown = 30; carregar(); }
        if (er) er.textContent = `Atualiza em ${_countdown}s`;
      }, 1000);
    }

    carregar();
  </script>
</body>
</html>
