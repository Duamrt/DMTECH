<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMTechApp — Configurações</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── CONFIG LAYOUT ── */
    .config-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 28px;
      max-width: 960px;
    }
    .cfg-nav { position: sticky; top: 0; }
    .cfg-nav-item {
      padding: 9px 14px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      transition: all .12s;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 3px solid transparent;
      letter-spacing: .02em;
    }
    .cfg-nav-item:hover { color: var(--text); background: var(--surface-2); }
    .cfg-nav-item.on {
      color: var(--accent);
      background: rgba(249,115,22,.06);
      border-left-color: var(--accent);
    }

    /* ── FORM ── */
    .cfg-section { margin-bottom: 28px; }
    .cfg-section-title {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-dim);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .cfg-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .cfg-field { display: flex; flex-direction: column; gap: 5px; }
    .cfg-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
    }
    .cfg-hint {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .cfg-actions { display: flex; justify-content: flex-end; margin-top: 20px; }

    /* ── EQUIPE ── */
    .eq-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .eq-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .eq-info { flex: 1; min-width: 0; }
    .eq-nome { font-size: 13px; font-weight: 700; color: var(--text); }
    .eq-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .eq-papel {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 9px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      flex-shrink: 0;
    }
    .eq-papel.dono { border-color: var(--accent); color: var(--accent); }

    /* ── PERMISSÕES ── */
    .perm-card {
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 14px;
      background: var(--surface-2);
    }
    .perm-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .perm-nome { font-size: 14px; font-weight: 700; color: var(--text); }
    .perm-role { font-size: 11px; color: var(--text-muted); margin-left: 8px; }
    .perm-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .perm-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
      background: var(--surface-3, var(--surface-2));
      padding: 6px 10px;
      border: 1px solid var(--border);
      transition: border-color .12s;
    }
    .perm-label.on { border-color: var(--accent); color: var(--accent); }
    .perm-label input { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface-2);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 480px;
      padding: 28px;
    }
    .modal-title { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row .form-group { margin-bottom: 0; }

    /* Senha toggle */
    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 40px; }
    .btn-eye {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 4px;
    }

    /* WA success */
    .wa-block {
      display: none;
      background: rgba(37,211,102,.06);
      border: 1px solid #25d366;
      padding: 14px;
      margin-top: 16px;
    }
    .wa-block.show { display: block; }
    .wa-block p { font-size: 12px; color: var(--text); line-height: 1.6; margin-bottom: 12px; white-space: pre-wrap; }
    .btn-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #25d366;
      color: #fff;
      border: none;
      padding: 9px 16px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
    }
    .btn-wa:hover { opacity: .88; }

    @media (max-width: 768px) {
      .config-layout { grid-template-columns: 1fr; }
      .cfg-nav { display: flex; flex-wrap: wrap; gap: 4px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
      .cfg-nav-item { border-left: none; border-bottom: 2px solid transparent; font-size: 11px; padding: 7px 10px; }
      .cfg-nav-item.on { border-left: none; border-bottom-color: var(--accent); }
      .cfg-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-name">DMTech</div>
        <div class="logo-sub" id="nome-empresa">—</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
        <a href="minha-fila.html" class="nav-item"><span class="nav-icon">◫</span> Minha Fila</a>
        <a href="clientes.html" class="nav-item"><span class="nav-icon">◎</span> Clientes</a>
        <a href="orcamentos.html" class="nav-item"><span class="nav-icon">◨</span> Orçamentos</a>
        <a href="os.html" class="nav-item"><span class="nav-icon">◈</span> Ordens de Serviço</a>
        <a href="kanban.html" class="nav-item"><span class="nav-icon">▦</span> Kanban</a>
        <a href="catalogo.html" class="nav-item"><span class="nav-icon">◧</span> Catálogo</a>
        <div class="nav-section">Gestão</div>
        <a href="financeiro.html" class="nav-item"><span class="nav-icon">◉</span> Financeiro</a>
        <div class="nav-section">Sistema</div>
        <a href="config.html" class="nav-item active"><span class="nav-icon">⚙</span> Configurações</a>
      </nav>
      <div class="sidebar-footer" id="versao-sidebar"></div>
    </aside>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <div class="topbar-title">Configurações</div>
        <div class="topbar-right">
          <span class="topbar-user" id="topbar-user"></span>
          <button class="btn-icon" id="btn-tema" onclick="toggleTema()" title="Alternar tema">◑</button>
          <button class="btn-sair" onclick="signOut()">Sair</button>
        </div>
      </div>

      <div class="content">
        <div class="page-header">
          <h2>Configurações</h2>
          <p>Dados da empresa, equipe e permissões.</p>
        </div>

        <div class="config-layout">
          <!-- Sub-nav -->
          <div class="cfg-nav" id="cfg-nav">
            <div class="cfg-nav-item on"  onclick="ir('empresa', this)">Dados da Empresa</div>
            <div class="cfg-nav-item"     onclick="ir('equipe', this)">Equipe</div>
            <div class="cfg-nav-item"     onclick="ir('permissoes', this)" id="nav-permissoes" style="display:none">Permissões</div>
          </div>
          <!-- Conteúdo dinâmico -->
          <div id="cfg-content">
            <div style="color:var(--text-dim);font-size:13px;padding:40px;text-align:center">Carregando...</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="versao" id="versao-rodape"></div>

  <!-- Modal novo técnico -->
  <div class="modal-overlay" id="modal-membro">
    <div class="modal">
      <div class="modal-title">Adicionar técnico</div>
      <div class="form-group">
        <label class="form-label">Nome completo *</label>
        <input class="form-input" type="text" id="m-nome" placeholder="João Silva">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">E-mail *</label>
          <input class="form-input" type="email" id="m-email" placeholder="joao@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp</label>
          <input class="form-input" type="tel" id="m-whatsapp" placeholder="(99) 99999-9999">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Senha temporária *</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="m-senha" placeholder="Mínimo 6 caracteres">
          <button class="btn-eye" onclick="toggleSenha()" type="button" id="btn-eye">◉</button>
        </div>
      </div>

      <div class="wa-block" id="wa-block">
        <p id="wa-texto"></p>
        <button class="btn-wa" onclick="abrirWA()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar pelo WhatsApp
        </button>
      </div>

      <div class="modal-actions" id="modal-membro-actions">
        <button class="btn btn-ghost" onclick="fecharModalMembro()">Cancelar</button>
        <button class="btn btn-primary" id="btn-criar-membro" onclick="criarMembro()">Criar acesso</button>
      </div>
    </div>
  </div>

  <script>
    console.log('%c DMTechApp ' + VERSION + ' ', 'background:#0d0d0d;color:#f97316;font-weight:bold;padding:2px 8px');
    document.getElementById('versao-rodape').textContent = VERSION;
    document.getElementById('versao-sidebar').textContent = VERSION;

    if (localStorage.getItem('dmtech-theme') === 'light') {
      document.body.classList.add('light');
      document.getElementById('btn-tema').textContent = '○';
    }
    function toggleTema() {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('dmtech-theme', isLight ? 'light' : 'dark');
      document.getElementById('btn-tema').textContent = isLight ? '○' : '◑';
    }

    function esc(v) {
      if (!v) return '';
      return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let _aba = 'empresa';
    let _novoMembroWA = null;

    // ── INIT ──
    (async () => {
      const ok = await requireAuth();
      if (!ok) return;

      const nome    = APP.profile.name || APP.profile.email || '';
      const empresa = APP.company?.name || '';
      document.getElementById('topbar-user').textContent  = nome;
      document.getElementById('nome-empresa').textContent = empresa;

      // Permissões só para o dono
      if (APP.profile.role === 'dono') {
        document.getElementById('nav-permissoes').style.display = '';
      }

      renderAba();
    })();

    // ── NAVEGAÇÃO ──
    function ir(aba, el) {
      _aba = aba;
      document.querySelectorAll('.cfg-nav-item').forEach(n => n.classList.remove('on'));
      if (el) el.classList.add('on');
      renderAba();
    }

    function renderAba() {
      const ct = document.getElementById('cfg-content');
      if (_aba === 'empresa')    renderEmpresa(ct);
      if (_aba === 'equipe')     renderEquipe(ct);
      if (_aba === 'permissoes') renderPermissoes(ct);
    }

    // ══════════════════════════════════════
    // EMPRESA
    // ══════════════════════════════════════
    function renderEmpresa(ct) {
      const c = APP.company || {};
      ct.innerHTML = `
        <div class="cfg-section">
          <div class="cfg-section-title">Dados da empresa</div>
          <div class="cfg-row">
            <div class="cfg-field">
              <label class="cfg-label">Nome</label>
              <input class="form-input" type="text" id="e-name" value="${esc(c.name||'')}" placeholder="Nome da empresa">
            </div>
            <div class="cfg-field">
              <label class="cfg-label">Telefone / WhatsApp</label>
              <input class="form-input" type="tel" id="e-phone" value="${esc(c.phone||'')}" placeholder="(99) 99999-9999">
            </div>
          </div>
          <div class="cfg-row">
            <div class="cfg-field">
              <label class="cfg-label">Chave PIX</label>
              <input class="form-input" type="text" id="e-pix" value="${esc(c.pix_key||'')}" placeholder="CPF, CNPJ, e-mail ou chave aleatória">
            </div>
            <div class="cfg-field">
              <label class="cfg-label">Endereço</label>
              <input class="form-input" type="text" id="e-address" value="${esc(c.address||'')}" placeholder="Rua, número — cidade/UF">
            </div>
          </div>
          <div class="cfg-actions">
            <button class="btn btn-primary" id="btn-salvar-emp" onclick="salvarEmpresa()">Salvar</button>
          </div>
        </div>`;
    }

    async function salvarEmpresa() {
      const btn = document.getElementById('btn-salvar-emp');
      btn.disabled = true; btn.textContent = 'Salvando...';
      const payload = {
        name:    document.getElementById('e-name').value.trim()    || null,
        phone:   document.getElementById('e-phone').value.trim()   || null,
        pix_key: document.getElementById('e-pix').value.trim()     || null,
        address: document.getElementById('e-address').value.trim() || null,
      };
      const { error } = await sb.from('companies').update(payload).eq('id', APP.company.id);
      btn.disabled = false; btn.textContent = 'Salvar';
      if (error) { dmToast('Erro: ' + error.message, 'error'); return; }
      Object.assign(APP.company, payload);
      document.getElementById('nome-empresa').textContent = payload.name || '';
      dmToast('Dados salvos!');
    }

    // ══════════════════════════════════════
    // EQUIPE
    // ══════════════════════════════════════
    async function renderEquipe(ct) {
      ct.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:40px;text-align:center">Carregando equipe...</div>';
      const { data, error } = await sb.from('profiles')
        .select('id, name, email, whatsapp, role')
        .eq('company_id', APP.company.id)
        .order('name');

      if (error || !data?.length) {
        ct.innerHTML = `
          <div style="text-align:right;margin-bottom:16px;">
            <button class="btn btn-primary" onclick="abrirModalMembro()">+ Adicionar técnico</button>
          </div>
          <div class="empty-state" style="padding:40px;text-align:center">Nenhum membro cadastrado.</div>`;
        return;
      }

      ct.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <div class="cfg-section-title" style="margin:0;border:none;padding:0">${data.length} membro${data.length !== 1 ? 's' : ''}</div>
          <button class="btn btn-primary" onclick="abrirModalMembro()">+ Adicionar técnico</button>
        </div>
        ${data.map(m => {
          const primeiro = (m.name || m.email || '?').split(' ')[0];
          const inicial  = primeiro[0].toUpperCase();
          const isDono   = m.role === 'dono';
          const sub      = [m.email, m.whatsapp ? fmtWA(m.whatsapp) : null].filter(Boolean).join(' · ');
          return `
          <div class="eq-card">
            <div class="eq-avatar">${inicial}</div>
            <div class="eq-info">
              <div class="eq-nome">${esc(primeiro)}</div>
              <div class="eq-sub">${esc(sub)}</div>
            </div>
            <span class="eq-papel ${isDono ? 'dono' : ''}">${isDono ? 'Dono' : 'Técnico'}</span>
            ${!isDono ? `<button class="btn btn-ghost" style="font-size:11px;padding:6px 12px" onclick="removerMembro('${m.id}','${esc(primeiro)}')">Remover</button>` : ''}
          </div>`;
        }).join('')}`;
    }

    function fmtWA(n) {
      const d = n.replace(/\D/g, '');
      if (d.length === 11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
      return n;
    }

    async function removerMembro(id, nome) {
      dmConfirm(`Remover ${nome} da equipe?`, async () => {
        const { error } = await sb.from('profiles').update({ company_id: null }).eq('id', id);
        if (error) { dmToast('Erro: ' + error.message, 'error'); return; }
        dmToast(`${nome} removido.`);
        renderEquipe(document.getElementById('cfg-content'));
      }, 'Remover', true);
    }

    // ══════════════════════════════════════
    // PERMISSÕES
    // ══════════════════════════════════════
    const _MODULOS = [
      { key: 'dashboard',   label: 'Dashboard (KPIs financeiros)' },
      { key: 'orcamentos',  label: 'Orçamentos' },
      { key: 'catalogo',    label: 'Catálogo (editar itens)' },
      { key: 'financeiro',  label: 'Financeiro' },
    ];
    const _DEFAULTS = { dashboard: false, orcamentos: false, catalogo: false, financeiro: false };

    async function renderPermissoes(ct) {
      ct.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:40px;text-align:center">Carregando...</div>';
      const { data, error } = await sb.from('profiles')
        .select('id, name, email, role, permissions')
        .eq('company_id', APP.company.id)
        .neq('role', 'dono')
        .order('name');

      if (error) { ct.innerHTML = `<div style="color:var(--danger);padding:12px">Erro: ${error.message}</div>`; return; }
      if (!data?.length) {
        ct.innerHTML = '<div class="empty-state" style="padding:40px;text-align:center">Nenhum técnico para configurar. Adicione membros na aba Equipe.</div>';
        return;
      }

      ct.innerHTML = `
        <div class="cfg-section">
          <div class="cfg-section-title">Permissões por técnico</div>
          <p style="font-size:12px;color:var(--text-muted);margin-bottom:20px;line-height:1.6">
            Minha Fila, Kanban, OS e Clientes são sempre visíveis.<br>
            Configure abaixo o que cada técnico pode acessar além disso.
          </p>
          ${data.map(m => {
            const primeiro = (m.name || m.email || '?').split(' ')[0];
            const perms    = Object.assign({}, _DEFAULTS, m.permissions || {});
            return `
            <div class="perm-card">
              <div class="perm-card-header">
                <div>
                  <span class="perm-nome">${esc(primeiro)}</span>
                  <span class="perm-role">${esc(m.email || '')}</span>
                </div>
                <button class="btn btn-primary" style="font-size:11px;padding:6px 14px" onclick="salvarPermissoes('${m.id}')">Salvar</button>
              </div>
              <div class="perm-grid" id="perm-grid-${m.id}">
                ${_MODULOS.map(mod => `
                  <label class="perm-label ${perms[mod.key] ? 'on' : ''}" id="perm-lbl-${m.id}-${mod.key}">
                    <input type="checkbox" data-uid="${m.id}" data-mod="${mod.key}"
                      ${perms[mod.key] ? 'checked' : ''}
                      onchange="togglePerm(this)">
                    ${esc(mod.label)}
                  </label>`).join('')}
              </div>
            </div>`;
          }).join('')}
        </div>`;
    }

    function togglePerm(el) {
      const lbl = document.getElementById(`perm-lbl-${el.dataset.uid}-${el.dataset.mod}`);
      if (lbl) lbl.classList.toggle('on', el.checked);
    }

    async function salvarPermissoes(uid) {
      const cbs = document.querySelectorAll(`input[data-uid="${uid}"]`);
      const perms = {};
      cbs.forEach(cb => { perms[cb.dataset.mod] = cb.checked; });
      const { error } = await sb.from('profiles').update({ permissions: perms }).eq('id', uid);
      if (error) { dmToast('Erro: ' + error.message, 'error'); return; }
      dmToast('Permissões salvas!');
    }

    // ══════════════════════════════════════
    // MODAL NOVO MEMBRO
    // ══════════════════════════════════════
    function abrirModalMembro() {
      ['m-nome','m-email','m-whatsapp','m-senha'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('wa-block').classList.remove('show');
      document.getElementById('modal-membro-actions').style.display = 'flex';
      document.getElementById('btn-criar-membro').disabled = false;
      document.getElementById('btn-criar-membro').textContent = 'Criar acesso';
      document.getElementById('modal-membro').classList.add('active');
      document.getElementById('m-nome').focus();
      _novoMembroWA = null;
    }

    function fecharModalMembro() {
      document.getElementById('modal-membro').classList.remove('active');
      if (_novoMembroWA) renderEquipe(document.getElementById('cfg-content'));
      _novoMembroWA = null;
    }

    document.getElementById('modal-membro').addEventListener('click', e => {
      if (e.target === e.currentTarget) fecharModalMembro();
    });

    function toggleSenha() {
      const inp = document.getElementById('m-senha');
      const btn = document.getElementById('btn-eye');
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '◎'; }
      else { inp.type = 'password'; btn.textContent = '◉'; }
    }

    async function criarMembro() {
      const nome     = document.getElementById('m-nome').value.trim();
      const email    = document.getElementById('m-email').value.trim();
      const whatsapp = document.getElementById('m-whatsapp').value.trim();
      const senha    = document.getElementById('m-senha').value;

      if (!nome || !email || !senha) { dmToast('Nome, e-mail e senha são obrigatórios.', 'error'); return; }
      if (senha.length < 6)          { dmToast('Senha mínima de 6 caracteres.', 'error'); return; }

      const btn = document.getElementById('btn-criar-membro');
      btn.disabled = true; btn.textContent = 'Criando...';

      const session = (await sb.auth.getSession()).data.session;
      const res = await fetch(`${SUPABASE_URL}/functions/v1/criar-membro`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${session?.access_token}`,
        },
        body: JSON.stringify({ name: nome, email, whatsapp, password: senha, company_id: APP.company.id }),
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        btn.disabled = false; btn.textContent = 'Criar acesso';
        dmToast('Erro: ' + (data.error || 'Falha ao criar.'), 'error');
        return;
      }

      // Sucesso
      const primeiro = nome.split(' ')[0];
      const appUrl   = window.location.origin + '/login.html';
      const texto    = `Olá ${primeiro}! Seu acesso foi criado.\n\nE-mail: ${email}\nSenha: ${senha}\nLink: ${appUrl}`;
      document.getElementById('wa-texto').textContent = texto;
      document.getElementById('wa-block').classList.add('show');
      document.getElementById('modal-membro-actions').style.display = 'none';

      _novoMembroWA = { primeiro, email, senha, whatsapp };
      dmToast(`Acesso de ${primeiro} criado!`);
    }

    function abrirWA() {
      if (!_novoMembroWA) return;
      const { primeiro, email, senha, whatsapp } = _novoMembroWA;
      const appUrl = window.location.origin + '/login.html';
      const msg = encodeURIComponent(`Olá ${primeiro}! Seu acesso foi criado.\n\nE-mail: ${email}\nSenha: ${senha}\nLink: ${appUrl}`);
      const num  = whatsapp.replace(/\D/g, '');
      const waNum = num.length === 11 ? '55' + num : num || '';
      if (!waNum) { dmToast('WhatsApp não informado.', 'error'); return; }
      window.open(`https://wa.me/${waNum}?text=${msg}`, '_blank');
    }
  </script>
</body>
