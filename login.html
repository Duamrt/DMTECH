<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMTechApp — Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://js.hcaptcha.com/1/api.js?render=explicit&onload=onHcaptchaLoad" async defer></script>
  <script src="js/posthog.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=05061308"></script>
  <link rel="stylesheet" href="css/styles.css?v=05061308">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-wrap {
      width: 100%;
      max-width: 360px;
      padding: 20px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo .name {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .login-logo .sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .login-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 28px;
    }
    .login-card .btn {
      width: 100%;
      justify-content: center;
      padding: 12px;
      font-size: 14px;
    }
    .login-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 10px;
      font-family: 'Fira Code', monospace;
      color: var(--text-dim);
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f97316">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DMTech">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="name">DMTech</div>
      <div class="sub">Gestão de ordens de serviço</div>
    </div>
    <div class="login-card">
      <div class="alert alert-error" id="erro"></div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-input" type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label class="form-label">Senha</label>
        <input class="form-input" type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="hcaptcha-login"></div>
      <button class="btn btn-primary" id="btn-login" onclick="fazerLogin()" disabled>Carregando…</button>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--text-muted)">
      Não tem conta? <a href="signup.html" style="color:var(--accent);text-decoration:none;font-weight:700">Criar agora →</a>
    </div>
    <div class="login-footer" id="versao-rodape"></div>
  </div>

  <script>
    console.log('%c DMTechApp ' + VERSION + ' ', 'background:#0d0d0d;color:#f97316;font-weight:bold;padding:2px 8px');
    document.getElementById('versao-rodape').textContent = VERSION;

    if (localStorage.getItem('dmtech-theme') === 'light') document.body.classList.add('light');

    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });

    sb.auth.getSession().then(async ({ data: { session } }) => {
      if (!session) return;
      const { data: p } = await sb.from('profiles').select('company_id').eq('id', session.user.id).single();
      window.location.href = p?.company_id === 'aaaa0001-0000-0000-0000-000000000001' ? 'admin.html' : 'dashboard.html';
    });

    var _loginCaptchaId = null;
    function onHcaptchaLoad() {
      _loginCaptchaId = hcaptcha.render('hcaptcha-login', {
        sitekey: '399a1136-6f52-4454-a4a0-d4de42eef8e0',
        size: 'invisible'
      });
      const btn = document.getElementById('btn-login');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }

    async function waitCaptcha(maxMs) {
      const start = Date.now();
      while (_loginCaptchaId === null && Date.now() - start < maxMs) {
        await new Promise(r => setTimeout(r, 100));
      }
      return _loginCaptchaId !== null;
    }

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn   = document.getElementById('btn-login');
      const erro  = document.getElementById('erro');

      erro.style.display = 'none';
      if (!email || !senha) { mostrarErro('Preencha e-mail e senha.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Entrando...';

      const captchaReady = await waitCaptcha(5000);
      if (!captchaReady) {
        mostrarErro('Não foi possível carregar a verificação. Recarregue a página.');
        btn.disabled = false; btn.textContent = 'Entrar';
        return;
      }

      var captchaToken = null;
      try {
        var result = await hcaptcha.execute(_loginCaptchaId, { async: true });
        captchaToken = result.response;
        hcaptcha.reset(_loginCaptchaId);
      } catch(e) { console.error('hcaptcha.execute falhou', e); }

      if (!captchaToken) {
        mostrarErro('Verificação anti-bot falhou. Tente novamente.');
        btn.disabled = false; btn.textContent = 'Entrar';
        return;
      }

      const { data: authData, error } = await sb.auth.signInWithPassword({
        email, password: senha, options: { captchaToken }
      });

      if (error) {
        console.error('signInWithPassword error', error);
        const msg = (error.message || '').toLowerCase().includes('captcha')
          ? 'Verificação anti-bot rejeitada. Recarregue a página.'
          : 'E-mail ou senha incorretos.';
        mostrarErro(msg);
        btn.disabled    = false;
        btn.textContent = 'Entrar';
        return;
      }

      const { data: p } = await sb.from('profiles').select('company_id').eq('id', authData.user.id).single();
      window.location.href = p?.company_id === 'aaaa0001-0000-0000-0000-000000000001' ? 'admin.html' : 'dashboard.html';
    }

    function mostrarErro(msg) {
      const el = document.getElementById('erro');
      el.textContent  = msg;
      el.style.display = 'block';
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
      navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
    }
  </script>
</body>
</html>
