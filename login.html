<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMTechApp — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      color: #38bdf8;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span {
      color: #64748b;
      font-size: 13px;
    }
    label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 15px;
      padding: 10px 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #38bdf8; }
    button {
      width: 100%;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #7dd3fc; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .erro {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .versao {
      text-align: center;
      color: #334155;
      font-size: 11px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>DMTechApp</h1>
      <span>Gestão de ordens de serviço</span>
    </div>
    <div class="erro" id="erro"></div>
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    <button id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="versao" id="versao-rodape"></div>
  </div>

  <script>
    console.log('%c DMTechApp ' + VERSION + ' ', 'background:#0f172a;color:#38bdf8;font-weight:bold;border-radius:4px;padding:2px 8px');
    document.getElementById('versao-rodape').textContent = VERSION;

    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });

    // Se já logado, redireciona
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btn-login');
      const erro = document.getElementById('erro');

      erro.style.display = 'none';
      if (!email || !senha) { mostrarErro('Preencha e-mail e senha.'); return; }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      const { error } = await sb.auth.signInWithPassword({ email, password: senha });

      if (error) {
        mostrarErro('E-mail ou senha incorretos.');
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return;
      }

      window.location.href = 'dashboard.html';
    }

    function mostrarErro(msg) {
      const el = document.getElementById('erro');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
