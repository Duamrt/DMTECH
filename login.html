<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMTechApp — Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=04141859"></script>
  <link rel="stylesheet" href="css/styles.css?v=04141859">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-wrap {
      width: 100%;
      max-width: 360px;
      padding: 20px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo .name {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .login-logo .sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .login-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 28px;
    }
    .login-card .btn {
      width: 100%;
      justify-content: center;
      padding: 12px;
      font-size: 14px;
    }
    .login-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 10px;
      font-family: 'Fira Code', monospace;
      color: var(--text-dim);
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f97316">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DMTech">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="name">DMTech</div>
      <div class="sub">Gestão de ordens de serviço</div>
    </div>
    <div class="login-card">
      <div class="alert alert-error" id="erro"></div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-input" type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label class="form-label">Senha</label>
        <input class="form-input" type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--text-muted)">
      Não tem conta? <a href="signup.html" style="color:var(--accent);text-decoration:none;font-weight:700">Criar agora →</a>
    </div>
    <div class="login-footer" id="versao-rodape"></div>
  </div>

  <script>
    console.log('%c DMTechApp ' + VERSION + ' ', 'background:#0d0d0d;color:#f97316;font-weight:bold;padding:2px 8px');
    document.getElementById('versao-rodape').textContent = VERSION;

    if (localStorage.getItem('dmtech-theme') === 'light') document.body.classList.add('light');

    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn   = document.getElementById('btn-login');
      const erro  = document.getElementById('erro');

      erro.style.display = 'none';
      if (!email || !senha) { mostrarErro('Preencha e-mail e senha.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Entrando...';

      const { error } = await sb.auth.signInWithPassword({ email, password: senha });

      if (error) {
        mostrarErro('E-mail ou senha incorretos.');
        btn.disabled    = false;
        btn.textContent = 'Entrar';
        return;
      }

      window.location.href = 'dashboard.html';
    }

    function mostrarErro(msg) {
      const el = document.getElementById('erro');
      el.textContent  = msg;
      el.style.display = 'block';
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
